spring:
  application:
    name: finance-api

  datasource:
    url: jdbc:postgresql://localhost:5433/finance_control
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  error:
    include-stacktrace: never

api:
  security:
    token:
      secret: ${JWT_secret_key:12345678}